name: ✨ Feature Request
description: Suggest an idea for Motrix Next
title: '[feat]: '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
        Please check [existing issues](https://github.com/gamelifes/motrix-next-learn/issues) and [discussions](https://github.com/gamelifes/motrix-next-learn/discussions) before submitting.
        Please make sure this request belongs to the Motrix Next desktop app. Browser-extension-only requests belong in [motrix-next-extension](https://github.com/gamelifes/motrix-next-extension), engine-only requests belong in [aria2-next](https://github.com/AnInsomniacy/aria2-next), and usage questions belong in [GitHub Discussions](https://github.com/gamelifes/motrix-next-learn/discussions).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What frustration are you experiencing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen. Be as specific as possible.
      placeholder: 'I would like to...'
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've thought of.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, screenshots, links to similar features in other apps, or any other context.

  - type: checkboxes
    id: validations
    attributes:
      label: Validations
      options:
        - label: I have searched the [existing issues](https://github.com/gamelifes/motrix-next-learn/issues) and this feature has not been requested before.
          required: true
        - label: I have read the [Contributing Guide](https://github.com/gamelifes/motrix-next-learn/blob/main/docs/CONTRIBUTING.md) and understand that new features require an approved issue before a PR is submitted.
          required: true
        - label: This request belongs to the Motrix Next desktop app, not the browser extension, download engine, or a usage question.
          required: true
